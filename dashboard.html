<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #e63946;
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface2: #242424;
            --border: #2e2e2e;
            --text: #e0e0e0;
            --muted: #888;
            --accent: #e63946;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 1rem;
        }

        /* ─── PROFILE PICKER OVERLAY ─── */
        #profile-overlay {
            position: fixed; inset: 0; z-index: 1000;
            background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            flex-direction: column;
            gap: 2rem;
        }
        #profile-overlay h1 {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 1.4rem;
            color: var(--muted);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
        .profile-cards { display: flex; gap: 1.5rem; }
        .profile-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2.5rem 3rem;
            cursor: pointer;
            font-size: 3rem;
            text-align: center;
            transition: border-color 0.2s, transform 0.15s;
        }
        .profile-card:hover { border-color: var(--red); transform: translateY(-4px); }
        .profile-card .profile-name {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.9rem;
            color: var(--muted);
            margin-top: 0.5rem;
            letter-spacing: 0.1em;
        }

        /* ─── MAIN LAYOUT ─── */
        #app { display: none; max-width: 660px; margin: 0 auto; }

        /* ─── TOP BAR ─── */
        .topbar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem 1.2rem;
            margin-bottom: 0.8rem;
        }
        .topbar-row1 {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid var(--border);
        }
        .brand {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--red);
            letter-spacing: 0.05em;
        }
        .user-chip {
            display: flex; align-items: center; gap: 0.5rem;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 0.3rem 0.8rem;
            font-size: 0.8rem;
            color: var(--muted);
            cursor: pointer;
        }
        .user-chip:hover { color: var(--text); border-color: #555; }

        /* ─── WEATHER ─── */
        .weather-strip {
            display: flex;
            gap: 0.3rem;
            overflow-x: auto;
            padding-bottom: 0.3rem;
            margin-bottom: 0.8rem;
            scrollbar-width: none;
        }
        .weather-strip::-webkit-scrollbar { display: none; }
        .w-item {
            flex-shrink: 0;
            text-align: center;
            padding: 0.4rem 0.6rem;
            border-radius: 6px;
            background: var(--surface2);
            min-width: 58px;
        }
        .w-label { font-size: 0.65rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
        .w-icon { font-size: 1.3rem; line-height: 1.4; }
        .w-temp { font-family: 'IBM Plex Mono', monospace; font-size: 0.9rem; font-weight: 600; color: var(--text); }
        .w-sub { font-size: 0.6rem; color: var(--muted); margin-top: 0.1rem; }

        /* ─── CLOCK ─── */
        .clock-row {
            display: flex; justify-content: space-between; align-items: baseline;
        }
        .clock-time {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--red);
            letter-spacing: 0.05em;
        }
        .clock-date { font-size: 0.8rem; color: var(--muted); }

        /* ─── CONTROLS ─── */
        .controls {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.8rem 1rem;
            margin-bottom: 0.8rem;
        }
        .filter-bar {
            display: flex; flex-wrap: wrap; gap: 0.4rem;
            margin-bottom: 0.7rem;
        }
        .filter-btn {
            background: var(--surface2);
            color: var(--muted);
            border: 1px solid var(--border);
            padding: 0.35rem 0.9rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            font-family: 'IBM Plex Sans', sans-serif;
            transition: all 0.15s;
            display: flex; align-items: center; gap: 0.35rem;
        }
        .filter-btn:hover { border-color: #555; color: var(--text); }
        .filter-btn.active { background: var(--red); color: white; border-color: var(--red); }
        .filter-btn .badge {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 0 5px;
            font-size: 0.7rem;
            line-height: 1.5;
        }
        .filter-btn:not(.active) .badge { background: var(--border); color: var(--muted); }

        .search-row { display: flex; gap: 0.5rem; align-items: center; }
        .search-input {
            flex: 1;
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-family: 'IBM Plex Sans', sans-serif;
        }
        .search-input:focus { outline: none; border-color: var(--red); }
        .search-input::placeholder { color: #555; }
        .mark-all-btn {
            background: var(--surface2);
            color: var(--muted);
            border: 1px solid var(--border);
            padding: 0.5rem 0.9rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-family: 'IBM Plex Sans', sans-serif;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
        }
        .mark-all-btn:hover { color: var(--text); border-color: #555; }

        /* ─── STATUS BAR ─── */
        .status-bar {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.72rem;
            color: var(--muted);
            padding: 0 0.2rem;
            margin-bottom: 0.5rem;
            font-family: 'IBM Plex Mono', monospace;
        }
        .status-bar .live-dot {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #2ecc71;
            margin-right: 5px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

        /* ─── NEWS FEED ─── */
        #news-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }
        .news-item {
            display: flex;
            gap: 0.9rem;
            padding: 0.9rem 1rem;
            border-bottom: 1px solid var(--border);
            transition: opacity 0.2s, background 0.15s;
            align-items: flex-start;
        }
        .news-item:last-child { border-bottom: none; }
        .news-item.is-read { opacity: 0.38; }
        .news-item:hover { background: var(--surface2); }
        .news-item.is-read:hover { opacity: 0.6; }

        .news-thumb {
            width: 64px; height: 64px;
            object-fit: cover;
            border-radius: 6px;
            flex-shrink: 0;
            background: var(--surface2);
        }
        .news-body { flex: 1; min-width: 0; }
        .news-title {
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text);
            text-decoration: none;
            line-height: 1.35;
            display: block;
            margin-bottom: 0.3rem;
        }
        .news-title:hover { color: var(--red); }
        .news-meta {
            display: flex; flex-wrap: wrap; gap: 0.4rem;
            align-items: center;
            margin-bottom: 0.3rem;
        }
        .cat-badge {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--red);
            border: 1px solid var(--red);
            border-radius: 3px;
            padding: 0 4px;
            letter-spacing: 0.04em;
        }
        .feed-name {
            font-size: 0.72rem;
            color: var(--muted);
            font-weight: 600;
        }
        .news-time {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.68rem;
            color: #555;
        }
        .news-summary {
            font-size: 0.78rem;
            color: #999;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .empty-state {
            padding: 3rem;
            text-align: center;
            color: var(--muted);
            font-size: 0.9rem;
        }

        /* ─── LOAD MORE ─── */
        .load-more-btn {
            display: block;
            width: 100%;
            background: var(--surface2);
            color: var(--muted);
            border: none;
            border-top: 1px solid var(--border);
            padding: 0.9rem;
            font-size: 0.82rem;
            font-family: 'IBM Plex Mono', monospace;
            cursor: pointer;
            transition: color 0.15s;
            border-radius: 0 0 10px 10px;
        }
        .load-more-btn:hover { color: var(--text); background: var(--surface); }

        /* scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    </style>
</head>
<body>

<!-- ─── PROFILE PICKER ─── -->
<div id="profile-overlay">
    <h1>Who's reading?</h1>
    <div class="profile-cards">
        <div class="profile-card" onclick="selectUser('chris')">
            👨
            <div class="profile-name">Chris</div>
        </div>
        <div class="profile-card" onclick="selectUser('hazel')">
            👩
            <div class="profile-name">Hazel</div>
        </div>
    </div>
</div>

<!-- ─── MAIN APP ─── -->
<div id="app">
    <div class="topbar">
        <div class="topbar-row1">
            <div class="brand">⚡ SUPERNOVA</div>
            <div class="user-chip" onclick="switchUser()" title="Switch user">
                <span id="user-label">👤</span>
                <span style="color:#555">▾</span>
            </div>
        </div>

        <div class="weather-strip" id="weather-strip">
            <div class="w-item"><div class="w-label">Loading</div></div>
        </div>

        <div class="clock-row">
            <div class="clock-time" id="clock-time">--:--:--</div>
            <div class="clock-date" id="clock-date"></div>
        </div>
    </div>

    <div class="controls">
        <div class="filter-bar" id="filter-bar"></div>
        <div class="search-row">
            <input class="search-input" id="search-input" type="text" placeholder="Search headlines…">
            <button class="mark-all-btn" onclick="markAllRead()">Mark all read</button>
        </div>
    </div>

    <div class="status-bar">
        <span><span class="live-dot"></span><span id="status-count">Loading…</span></span>
        <span id="last-updated"></span>
    </div>

    <div id="news-container">
        <div class="empty-state">Loading news…</div>
    </div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────
let currentUser = null;
let allItems = [];
let activeCategories = new Set();
let searchTerm = '';
let displayedCount = 30;
const PAGE_SIZE = 30;

const WMO = {
    0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",48:"🌫️",
    51:"🌧️",53:"🌧️",55:"🌧️",61:"🌧️",63:"🌧️",65:"🌧️",
    71:"🌨️",73:"🌨️",75:"🌨️",80:"🌦️",81:"🌦️",82:"🌦️",95:"⛈️"
};

// ─── USER PROFILE ────────────────────────────────────────
function selectUser(name) {
    localStorage.setItem('sn_user', name);
    currentUser = name;
    document.getElementById('user-label').textContent = name === 'chris' ? '👨 Chris' : '👩 Hazel';
    document.getElementById('profile-overlay').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
}

function switchUser() {
    document.getElementById('profile-overlay').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    allItems = [];
    activeCategories.clear();
}

function checkSavedUser() {
    const saved = localStorage.getItem('sn_user');
    if (saved === 'chris' || saved === 'hazel') {
        selectUser(saved);
    }
}

// ─── CLOCK ───────────────────────────────────────────────
function updateClock() {
    const now = new Date();
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const d = now.getDate(), mo = months[now.getMonth()], y = now.getFullYear();
    const dy = days[now.getDay()];
    const suffix = d===1||d===21||d===31?'st':d===2||d===22?'nd':d===3||d===23?'rd':'th';
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    const tz = -now.getTimezoneOffset()/60;
    const tzLabel = tz===0?'GMT':tz===1?'BST':`GMT${tz>=0?'+':''}${tz}`;
    document.getElementById('clock-time').textContent = `${h}:${m}:${s}`;
    document.getElementById('clock-date').textContent = `${dy} ${d}${suffix} ${mo} ${y} · ${tzLabel}`;
}
setInterval(updateClock, 1000);
updateClock();

// ─── WEATHER ─────────────────────────────────────────────
async function loadWeather() {
    try {
        const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=53.06&longitude=-2.45&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Europe%2FLondon&forecast_days=5');
        const data = await res.json();
        const curTemp = Math.round(data.current.temperature_2m);
        const curIcon = WMO[data.current.weather_code] || '❓';
        let html = `<div class="w-item"><div class="w-label">Now</div><div class="w-icon">${curIcon}</div><div class="w-temp">${curTemp}°</div></div>`;

        for (let i = 0; i < 5; i++) {
            const date = new Date();
            date.setDate(date.getDate() + i);
            const dateStr = date.toISOString().split('T')[0];
            const idx = data.daily.time.indexOf(dateStr);
            if (idx === -1) continue;
            const max = Math.round(data.daily.temperature_2m_max[idx]);
            const min = Math.round(data.daily.temperature_2m_min[idx]);
            const icon = WMO[data.daily.weather_code[idx]] || '❓';
            const precip = data.daily.precipitation_probability_max[idx] || 0;
            const label = i === 0 ? 'Today' : i === 1 ? 'Tmrw' : date.toLocaleDateString('en-GB', {weekday:'short'});
            html += `<div class="w-item">
                <div class="w-label">${label}</div>
                <div class="w-icon">${icon}</div>
                <div class="w-temp">${max}°</div>
                <div class="w-sub">${min}° ${precip > 0 ? '💧'+precip+'%' : ''}</div>
            </div>`;
        }
        document.getElementById('weather-strip').innerHTML = html;
    } catch(e) {
        document.getElementById('weather-strip').innerHTML = '<span style="color:#555;font-size:0.8rem">Weather unavailable</span>';
    }
}

// ─── READ TRACKING ────────────────────────────────────────
function storageKey() { return `sn_read_${currentUser}`; }

function getReadSet() {
    try { return new Set(JSON.parse(localStorage.getItem(storageKey()) || '[]')); }
    catch { return new Set(); }
}

function saveReadSet(set) {
    localStorage.setItem(storageKey(), JSON.stringify([...set]));
}

function markAsRead(url) {
    const s = getReadSet();
    s.add(url);
    saveReadSet(s);
    const el = document.querySelector(`[data-url="${CSS.escape(url)}"]`);
    if (el) el.classList.add('is-read');
}

function markAllRead() {
    const s = getReadSet();
    const filtered = getFilteredItems();
    filtered.forEach(item => s.add(item.link));
    saveReadSet(s);
    renderNews();
}

// ─── FILTERS ─────────────────────────────────────────────
let categoryData = {};  // cat -> count of unread

function renderFilters(categories) {
    const readSet = getReadSet();
    const bar = document.getElementById('filter-bar');
    bar.innerHTML = categories.map(cat => {
        const total = allItems.filter(i => i.feedCategory === cat).length;
        const unread = allItems.filter(i => i.feedCategory === cat && !readSet.has(i.link)).length;
        const active = activeCategories.has(cat) ? 'active' : '';
        const badgeText = unread > 0 ? unread : total;
        return `<button class="filter-btn ${active}" onclick="toggleCat('${cat}')">
            ${cat}<span class="badge">${badgeText}</span>
        </button>`;
    }).join('');
}

function toggleCat(cat) {
    if (activeCategories.has(cat)) activeCategories.delete(cat);
    else activeCategories.add(cat);
    renderNews();
}

// ─── DATE FORMAT ──────────────────────────────────────────
function fmtDate(str) {
    const d = new Date(str);
    if (isNaN(d)) return str;
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const day = days[d.getDay()], date = d.getDate(), mo = months[d.getMonth()], yr = d.getFullYear();
    const suffix = date===1||date===21||date===31?'st':date===2||date===22?'nd':date===3||date===23?'rd':'th';
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')} · ${day} ${date}${suffix} ${mo} ${yr}`;
}

// ─── RENDER NEWS ─────────────────────────────────────────
function getFilteredItems() {
    let items = allItems.filter(i => activeCategories.has(i.feedCategory));
    if (searchTerm) {
        const t = searchTerm.toLowerCase();
        items = items.filter(i =>
            (i.title||'').toLowerCase().includes(t) ||
            (i.feedName||'').toLowerCase().includes(t)
        );
    }
    return items;
}

function renderNews() {
    const container = document.getElementById('news-container');
    const filtered = getFilteredItems();
    const readSet = getReadSet();
    const slice = filtered.slice(0, displayedCount);

    // Update filter badges
    const cats = [...activeCategories, ...allItems.map(i=>i.feedCategory).filter(c=>!activeCategories.has(c))];
    const allCats = [...new Set(allItems.map(i=>i.feedCategory))];
    renderFilters(allCats);

    // Status
    const unreadCount = filtered.filter(i => !readSet.has(i.link)).length;
    document.getElementById('status-count').textContent =
        `${filtered.length} articles · ${unreadCount} unread`;

    if (slice.length === 0) {
        container.innerHTML = '<div class="empty-state">No articles match your filters.</div>';
        return;
    }

    let html = '';
    for (const item of slice) {
        const isRead = readSet.has(item.link);
        const readClass = isRead ? 'is-read' : '';
        const imgUrl = item.thumbnail || item.enclosure?.link ||
            `https://ui-avatars.com/api/?name=${encodeURIComponent((item.feedName||'?')[0])}&background=2e2e2e&color=e63946&size=64`;

        const tmp = document.createElement('div');
        tmp.innerHTML = item.description || '';
        const summary = (tmp.textContent || '').trim();

        html += `<div class="news-item ${readClass}" data-url="${item.link}">
            <img class="news-thumb" src="${imgUrl}" loading="lazy" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent((item.feedName||'?')[0])}&background=2e2e2e&color=e63946&size=64'">
            <div class="news-body">
                <a class="news-title" href="${item.link}" target="_blank" onclick="markAsRead('${item.link}')">${item.title || 'Untitled'}</a>
                <div class="news-meta">
                    <span class="cat-badge">${item.feedCategory}</span>
                    <span class="feed-name">${item.feedName}</span>
                    <span class="news-time">${fmtDate(item.pubDate)}</span>
                </div>
                ${summary ? `<div class="news-summary">${summary}</div>` : ''}
            </div>
        </div>`;
    }

    if (filtered.length > displayedCount) {
        html += `<button class="load-more-btn" onclick="loadMore()">
            ↓ Load more (${filtered.length - displayedCount} remaining)
        </button>`;
    }

    container.innerHTML = html;
}

function loadMore() {
    displayedCount += PAGE_SIZE;
    renderNews();
}

// ─── LOAD DATA ────────────────────────────────────────────
async function loadNews() {
    try {
        // Try local server first; fall back to static files on Cloudflare
        const smartFetch = async (primary, fallback) => {
            try { const r = await fetch(primary); if (r.ok) return r; } catch(e) {}
            return fetch(fallback);
        };
        const [feedsRes, newsRes] = await Promise.all([
            smartFetch('/api/feeds', '/feeds.json'),
            smartFetch('/api/news',  '/news.json')
        ]);
        const feedsData = await feedsRes.json();
        const newsItems = await newsRes.json();

        const categories = feedsData.categories || ['News','Sport','Blogs'];

        if (activeCategories.size === 0) {
            categories.forEach(c => activeCategories.add(c));
        }

        allItems = newsItems.filter(item =>
            item.feedVisibility === currentUser || item.feedVisibility === 'both'
        );
        allItems.sort((a,b) => new Date(b.pubDate) - new Date(a.pubDate));

        const now = new Date();
        document.getElementById('last-updated').textContent =
            `Updated ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

        renderNews();
    } catch(e) {
        document.getElementById('news-container').innerHTML =
            `<div class="empty-state" style="color:#e63946">Failed to load news: ${e.message}</div>`;
    }
}

// ─── SEARCH ──────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', e => {
    searchTerm = e.target.value;
    displayedCount = PAGE_SIZE;
    renderNews();
});

// ─── INIT ─────────────────────────────────────────────────
function init() {
    loadWeather();
    loadNews();
    setInterval(() => { loadWeather(); loadNews(); }, 300000);
}

// ─── BOOT ─────────────────────────────────────────────────
checkSavedUser();
</script>
</body>
</html>
