<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supernova</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --red: #e63946; --bg: #0f0f0f; --surface: #1a1a1a; --border: #2e2e2e; --text: #e0e0e0; --muted: #888; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .wrap { max-width: 340px; width: 100%; text-align: center; }
        .logo {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 2rem;
            font-weight: 600;
            color: var(--red);
            letter-spacing: 0.1em;
            margin-bottom: 0.3rem;
        }
        .tagline { font-size: 0.8rem; color: var(--muted); margin-bottom: 2.5rem; letter-spacing: 0.05em; }
        a {
            display: flex; align-items: center; gap: 0.8rem;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            text-decoration: none;
            padding: 1rem 1.2rem;
            border-radius: 8px;
            font-weight: 600;
            margin-bottom: 0.6rem;
            transition: border-color 0.15s, transform 0.1s;
            font-size: 0.95rem;
        }
        a:hover { border-color: var(--red); transform: translateX(3px); }
        a .icon { font-size: 1.4rem; }
        a .desc { font-size: 0.75rem; color: var(--muted); font-weight: 400; margin-top: 0.1rem; }
        a .label { text-align: left; }
        .admin-link { margin-top: 1.5rem; border-style: dashed; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="logo">⚡ SUPERNOVA</div>
        <div class="tagline">The news you want, when you want it.</div>

        <a href="dashboard.html">
            <span class="icon">📰</span>
            <div class="label">
                <div>Open Dashboard</div>
                <div class="desc">Pick your profile and read the news</div>
            </div>
        </a>

        <a href="admin.html" class="admin-link">
            <span class="icon">⚙️</span>
            <div class="label">
                <div>Feed Settings</div>
                <div class="desc">Manage sources, categories, archive</div>
            </div>
        </a>
    </div>
</body>
</html>
